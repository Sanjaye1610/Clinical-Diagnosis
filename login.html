<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0; 
      background-image: url('tr.png');
      background-color: rgba(224, 33, 33, 0.5); 
      background-size: cover;
    }
    .login-container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      width: 300px;
      text-align: center;
    }
    .login-container h2 {
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 95%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 30px;
    }
    .login-btn {
      width: 95%;
      padding: 10px;
      background-color: #000000;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .login-btn:hover {
      background-color: #5f6265b2;
    }
    .links {
      margin-top: 15px;
      font-size: 14px;
    }
    .links a {
      text-decoration: none;
      color: #5085bd;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="links">
      <p><a href="forgot.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="lin.html">Sign Up</a></p>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const savedData = sessionStorage.getItem('formData');
      if (!savedData) {
        alert('No account found. Please sign up first.');
        return;
      }

      const formData = JSON.parse(savedData);

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

   
      if (username === formData.username && password === formData.password) {
        alert('Login successful!');
        window.location.href = 'home.html';
      } else {
        alert('Username or password does not match. Please try again.');
      }
    });
  </script>
</body>
</html>
