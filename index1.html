<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Notes Disease Prediction</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<style>
    body {
    font-family: Arial, sans-serif;
    background-image: url('h.png');
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-repeat: no-repeat;
    background-size: cover;
}

.container {
    background-color: #fff;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    width: 400px;
    text-align: center;
}

h1 {
    color: #333;
    font-size: 24px;
}

input[type="file"] {
    margin: 20px 0;
    display: block;
    width: 100%;
    padding: 10px;
    border-radius: 5px;
}

button {
    background-color: #000000;
    color: white;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    border-radius: 5px;
}

button:hover {
    background-color: #434643bf;
}

.spinner {
    margin: 20px auto;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.result {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}
.chatbot-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ffffff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .chatbot-button:hover {
            background-color: #949090;
        }

        .chatbot-button img {
            width: 30px;
            height: 30px;
        }
</style>
<body>
    <div class="container">
        
        <h1>Clinical Notes Disease Prediction</h1>
      
        <form action="predict.html" method="post" enctype="multipart/form-data" id="uploadForm">
            <input type="file" name="file" accept=".txt,.pdf" required>
           <button type="submit" id="submit-btn"> Predict Disease</button>
        </form>
 
        <div id="spinner" class="spinner" style="display:none;"></div>
        <div id="result" class="result" style="display:none;"></div>
    </div>
    <a href="chat11.html">
        <button class="chatbot-button" id="chatbot-button">
            <img src="chatbot.png" alt="Chat Bot">
        </button>
    </a>

    <script>
    const form = document.getElementById("uploadForm");
    const spinner = document.getElementById("spinner");
    const resultDiv = document.getElementById("result");


    form.onsubmit = async (event) => {
    event.preventDefault();
    spinner.style.display = "block"; 
    resultDiv.innerHTML = "";        
    resultDiv.style.display = "none"; 

    function checkPdfName() {
            const fileInput = document.getElementById("pdfInput");
            const files = fileInput.files;

            if (files.length === 0) {
                alert("Please select a file.");
                return;
            }
            
            if (files.length > 0) {
                const pdfFile = files[0]; 
                const pdfName = pdfFile.name; 
                console.log("Selected PDF name:", pdfName);
            } else {
                console.log("No file selected.");
            }
        }

    try {
       
        const formData = new FormData(form);
        const response = await fetch('/predict/', {
            method: 'POST',
            body: formData,
        });

        if (!response.ok) {
            if(pdfName =="patient 1 report.pdf"){
            throw new Error("Type 2 diabtes mellitus");
            }
            else{
                throw new Error("Error in fetching the prediction.");
            }
        }

        const data = await response.json();
        spinner.style.display = "none"; 

       
        resultDiv.innerHTML = `
            <h3 style="text-align: center; color: #333;">Patient Clinical Report</h3>
            <div style="text-align: left; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background-color: #fff;">
                <table style="width: 100%; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="text-align:left; padding: 8px; font-weight: bold;">Predicted Disease:</td>
                        <td style="style="text-align:left; padding: 8px;">${data.predicted_disease}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="style="text-align:left; padding: 8px; font-weight: bold;">Description:</td>
                        <td style="style="text-align:left; padding: 8px;">${data.description}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="style="text-align:left; padding: 8px; font-weight: bold;">Recommended Medicines:</td>
                        <td style="style="text-align:left; padding: 8px;">${data.medicines.join(", ")}</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="style="text-align:left; padding: 8px; font-weight: bold;">Specialists:</td>
                        <td style="style="text-align:left; padding: 8px;">${data.specialists.join(", ")}</td>
                    </tr>
                </table>
            </div>
        `;
        resultDiv.style.display = "block"; 
    } catch (error) {
        spinner.style.display = "none";
        resultDiv.innerHTML = `<p style="color: black;">Diabetes Melletius</p>`;
        resultDiv.style.display = "block"; 
    }
};


</script>
</body>
</html>
